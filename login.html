<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crescer Edu — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #4CAF50;
    --verde-escuro: #2E7D32;
    --verde-claro: #81C784;
    --verde-menta: #E8F5E9;
    --marrom: #5D4037;
    --creme: #FFF8F0;
    --branco: #FFFFFF;
    --text: #2C1A0E;
    --text-light: #8D6E63;
    --accent: #FF7043;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 40%, #388E3C 70%, #43A047 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='35' fill='none' stroke='%23ffffff' stroke-opacity='0.04' stroke-width='1'/%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }

  .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15; animation: float 8s ease-in-out infinite; }
  .orb-1 { width: 400px; height: 400px; background: #81C784; top: -100px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 300px; height: 300px; background: #FDD835; bottom: -80px; right: -80px; animation-delay: 3s; }
  .orb-3 { width: 200px; height: 200px; background: #FF7043; top: 50%; right: 10%; animation-delay: 5s; }

  @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

  .login-container { position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 20px; }

  .login-card {
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.2);
    animation: slideUp 0.6s ease forwards;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  .login-logo { text-align: center; margin-bottom: 32px; }

  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--verde-escuro), var(--verde));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(46,125,50,0.35);
  }

  .logo-icon svg { width: 36px; height: 36px; color: white; }

  .logo-title { font-family: 'Fraunces', serif; font-size: 28px; color: var(--verde-escuro); font-weight: 900; }
  .logo-title span { color: var(--verde); }
  .logo-sub { font-size: 13px; color: var(--text-light); margin-top: 4px; }

  .role-tabs { display: flex; background: var(--verde-menta); border-radius: 12px; padding: 4px; margin-bottom: 28px; gap: 4px; }

  .role-tab {
    flex: 1; padding: 10px 8px; border: none; background: transparent; border-radius: 10px;
    font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-light);
    cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .role-tab svg { width: 14px; height: 14px; }
  .role-tab.active { background: var(--verde-escuro); color: white; box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
  .role-tab:hover:not(.active) { background: rgba(46,125,50,0.1); color: var(--verde-escuro); }

  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

  .form-input {
    width: 100%; padding: 13px 16px; border: 2px solid #E8F5E9; border-radius: 12px;
    font-family: 'Sora', sans-serif; font-size: 14px; color: var(--text); background: #FAFAFA;
    transition: all 0.2s ease; outline: none;
  }
  .form-input:focus { border-color: var(--verde); background: white; box-shadow: 0 0 0 3px rgba(76,175,80,0.12); }
  .form-input::placeholder { color: #B0BEC5; }

  .password-wrapper { position: relative; }
  .password-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text-light); transition: color 0.2s; display: flex; align-items: center;
  }
  .password-toggle svg { width: 18px; height: 18px; }
  .password-toggle:hover { color: var(--verde-escuro); }

  .form-extras { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 13px; }
  .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-light); cursor: pointer; }
  .remember-me input { accent-color: var(--verde); width: 16px; height: 16px; }
  .forgot-link { color: var(--verde-escuro); font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
  .forgot-link:hover { opacity: 0.7; }

  .btn-login {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--verde-escuro), var(--verde));
    color: white; border: none; border-radius: 12px; font-family: 'Sora', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.25s ease;
    box-shadow: 0 6px 20px rgba(46,125,50,0.35); position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.25s; }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(46,125,50,0.45); }
  .btn-login:hover::before { background: rgba(255,255,255,0.08); }
  .btn-login:active { transform: translateY(0); }

  .spinner {
    display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-login.loading .spinner { display: inline-block; }
  .btn-login.loading .btn-text { opacity: 0.7; }

  .demo-creds { margin-top: 24px; padding: 16px; background: var(--verde-menta); border-radius: 12px; border-left: 3px solid var(--verde); }
  .demo-creds h4 { font-size: 12px; font-weight: 700; color: var(--verde-escuro); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .demo-creds h4 svg { width: 14px; height: 14px; }
  .demo-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(76,175,80,0.15); font-size: 12px; }
  .demo-item:last-child { border-bottom: none; padding-bottom: 0; }
  .demo-label { color: var(--text-light); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .demo-label svg { width: 13px; height: 13px; }
  .demo-val { font-weight: 700; color: var(--verde-escuro); font-family: monospace; font-size: 13px; }
  .demo-fill-btn {
    background: none; border: 1px solid var(--verde-claro); color: var(--verde-escuro);
    border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: 'Sora', sans-serif;
  }
  .demo-fill-btn:hover { background: var(--verde-escuro); color: white; border-color: var(--verde-escuro); }

  .error-msg {
    display: none; background: #FDECEA; color: #C62828; border-radius: 10px;
    padding: 12px 16px; font-size: 13px; font-weight: 600; margin-bottom: 16px;
    border-left: 3px solid #E53935; animation: shake 0.3s ease;
    align-items: center; gap: 8px;
  }
  .error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }
  .error-msg.show { display: flex; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  .login-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-light); }
  .login-footer a { color: var(--verde-escuro); font-weight: 600; text-decoration: none; }
  .login-footer a:hover { text-decoration: underline; }

  .back-link {
    display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.8);
    font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px;
    transition: color 0.2s; position: relative; z-index: 10;
  }
  .back-link svg { width: 16px; height: 16px; }
  .back-link:hover { color: white; }

  @media (max-width: 520px) {
    .login-card { padding: 32px 24px; }
    .role-tab { font-size: 11px; padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
  <a href="crescer-edu-final.html" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Voltar para o site
  </a>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:white"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-4.03 9-9 9S3 15.97 3 11A9 9 0 0 1 12 2z"/><path d="M12 7v5l3 3"/><path d="M7.5 4.2c-.3.8-.5 1.7-.5 2.8 0 4.97 4.03 9 9 9 .9 0 1.7-.1 2.5-.3"/></svg>
      </div>
      <div class="logo-title">Crescer <span>Edu</span></div>
      <div class="logo-sub">Acesse sua conta</div>
    </div>

    <!-- Role Tabs -->
    <div class="role-tabs">
      <button class="role-tab active" data-role="aluno" onclick="selectRole('aluno', this)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Aluno
      </button>
      <button class="role-tab" data-role="professor" onclick="selectRole('professor', this)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Professor
      </button>
      <button class="role-tab" data-role="gestor" onclick="selectRole('gestor', this)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Gestor
      </button>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
      Email ou senha incorretos. Tente novamente.
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right: 48px;">
          <button type="button" class="password-toggle" onclick="togglePassword()" id="pwToggle">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-extras">
        <label class="remember-me">
          <input type="checkbox" id="remember"> Lembrar de mim
        </label>
        <a href="#" class="forgot-link">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner"></span>
        <span class="btn-text">Entrar</span>
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="demo-creds">
      <h4>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        Credenciais de Demonstração
      </h4>

      <div class="demo-item">
        <span class="demo-label">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          Aluno
        </span>
        <span class="demo-val">aluno@crescer.edu / aluno123</span>
        <button class="demo-fill-btn" onclick="fillCreds('aluno@crescer.edu','aluno123','aluno')">Usar</button>
      </div>

      <div class="demo-item">
        <span class="demo-label">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Professor
        </span>
        <span class="demo-val">prof@crescer.edu / prof123</span>
        <button class="demo-fill-btn" onclick="fillCreds('prof@crescer.edu','prof123','professor')">Usar</button>
      </div>

      <div class="demo-item">
        <span class="demo-label">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Gestor
        </span>
        <span class="demo-val">gestor@crescer.edu / gestor123</span>
        <button class="demo-fill-btn" onclick="fillCreds('gestor@crescer.edu','gestor123','gestor')">Usar</button>
      </div>
    </div>

    <div class="login-footer">
      Ainda não tem conta? <a href="#">Cadastre-se grátis</a>
    </div>
  </div>
</div>

<script>
  const USERS = {
    'aluno@crescer.edu':   { password: 'aluno123',   role: 'aluno',     name: 'Ana Silva',        redirect: 'dashboard-aluno.html' },
    'prof@crescer.edu':    { password: 'prof123',    role: 'professor',  name: 'Prof. Carlos Lima', redirect: 'dashboard-professor.html' },
    'gestor@crescer.edu':  { password: 'gestor123',  role: 'gestor',     name: 'Diretora Mariana',  redirect: 'dashboard-gestor.html' },
  };

  let currentRole = 'aluno';

  function selectRole(role, btn) {
    currentRole = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    hideError();
  }

  function fillCreds(email, password, role) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
    const tab = document.querySelector(`[data-role="${role}"]`);
    selectRole(role, tab);
    tab.classList.add('active');
    hideError();
  }

  function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" x2="23" y1="1" y2="23"/>';
    } else {
      pw.type = 'password';
      icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    hideError();

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      const user = USERS[email];

      if (user && user.password === password) {
        localStorage.setItem('crescer_user', JSON.stringify({
          email,
          name: user.name,
          role: user.role,
          loginTime: new Date().toISOString()
        }));

        btn.style.background = 'linear-gradient(135deg, #1B5E20, #2E7D32)';
        btn.querySelector('.btn-text').textContent = 'Entrando...';

        setTimeout(() => window.location.href = user.redirect, 800);
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        showError();
      }
    }, 900);
  }

  function showError() { document.getElementById('errorMsg').classList.add('show'); }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  window.addEventListener('load', () => {
    const session = localStorage.getItem('crescer_user');
    if (session) {
      const user = JSON.parse(session);
      const userDef = USERS[user.email];
      if (userDef) window.location.href = userDef.redirect;
    }
  });
</script>
</body>
</html>
